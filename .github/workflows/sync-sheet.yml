name: Sync products from Google Sheet

on:
  # Tạm dừng đồng bộ tự động — bỏ dấu # ở dòng "schedule"/"cron" bên dưới để
  # bật lại lịch chạy mỗi giờ.
  # schedule:
  #   - cron: "0 * * * *" # every hour, on the hour
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab, to test

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-sheet endpoint
        run: |
          curl -sf -X POST "${{ secrets.SYNC_ENDPOINT_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SYNC_SECRET }}"
